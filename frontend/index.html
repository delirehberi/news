<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Curated News</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="antialiased">
    <!-- Dynamic animated dark background -->
    <div class="fixed inset-0 bg-gradient-to-br from-slate-900 via-[#111827] to-[#1e1b4b] -z-10"></div>
    
    <header class="pt-20 pb-12 text-center relative">
      <h1 class="text-5xl md:text-7xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-400 mb-4 drop-shadow-sm">
        AI Curated News
      </h1>
      <p class="text-slate-400 text-lg md:text-xl font-light tracking-wide mb-2">
        delirehberi's personalized feed from HN, Lobsters, and Reddit
      </p>
      <p id="curated-status" class="text-xs text-violet-400/80 font-mono hidden"></p>
    </header>

    <main class="max-w-3xl mx-auto px-4 pb-24">
      <div id="loading" class="flex justify-center items-center h-32">
        <div class="w-12 h-12 border-4 border-violet-500/30 border-t-violet-500 rounded-full animate-spin"></div>
      </div>
      <div id="error" class="hidden text-center text-red-400 glass p-6 rounded-2xl border border-red-500/20"></div>
      
      <div id="feed" class="hidden flex flex-col gap-5">
        <!-- Articles dynamically injected here -->
      </div>
    </main>

    <footer class="mt-auto py-8 text-center border-t border-white/5 relative z-10 bg-black/20 backdrop-blur-md">
      <p class="text-slate-400 text-sm flex items-center justify-center gap-2">
        <svg class="w-5 h-5 text-slate-300" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
        </svg>
        <span>Open Source on <a href="https://github.com/delirehberi/news" target="_blank" rel="noopener noreferrer" class="text-violet-400 hover:text-violet-300 transition-colors font-medium">GitHub</a></span>
      </p>
    </footer>

    <script type="module" src="/main.js"></script>
  </body>
</html>
